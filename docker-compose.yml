services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: treemap-postgres
    environment:
      POSTGRES_USER: treemap
      POSTGRES_PASSWORD: treemap
      POSTGRES_DB: treemap
    ports:
      - "5432:5432"
    volumes:
      - treemap-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U treemap -d treemap"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  treemap-pgdata:
